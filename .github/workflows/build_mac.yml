name: build_mac

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLEID: ${{ secrets.APPLEID }}
      APPLEID_PASSWORD: ${{ secrets.APPLEID_PASSWORD }}

    steps:
    - name: Import signing keychain
      if: ${{ env.CSC_LINK != '' }}
      uses: apple-actions/import-codesign-certs@v2
      with:
        keychain: signing_temp
        p12-file-base64: ${{ secrets.CSC_LINK }}
        p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 16

    - name: Disable notarization when no signing cert
      if: ${{ env.CSC_LINK == '' }}
      run: |
        node -e "
          const p = require('./pack/electron/package.json');
          delete p.build.afterSign;
          delete p.build.mac.extendInfo;
          require('fs').writeFileSync('./pack/electron/package.json', JSON.stringify(p, null, 2));
        "

    - run: npm ci
    - run: npm run pack:prepare
    - run: npm run pack:mac:publish

    - name: Cleanup keychain
      if: always()
      shell: bash
      run: |
        security delete-keychain signing_temp.keychain || true
